<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="style.css"/>
    <title>Makro</title>
</head>
<body>
<div id="app">
    <div id="toolbar">
        <div id="tabs"></div>
        <div id="toolbar-spacer"></div>
        <button id="btn-toggle" title="Toggle chat panel (⌘B)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="2" width="3.5" height="10" rx="1" fill="currentColor" opacity="0.9"/><rect x="8.5" y="2" width="3.5" height="10" rx="1" fill="currentColor" opacity="0.35"/></svg></button>
        <button id="btn-new" title="New Session">+</button>
        <button id="btn-refresh" title="Refresh">&#x21bb;</button>
        <button id="btn-connect" title="Connection info">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1a4 4 0 014 4v2a4 4 0 01-8 0V5a4 4 0 014-4zM2 9a6 6 0 0012 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
        <div id="connect-popup" class="popup hidden">
            <div class="popup-title">iOS Connection</div>
            <div class="popup-row"><span class="popup-label">Server</span><span id="popup-url" class="popup-value"></span><button class="popup-copy" data-copy="url">Copy</button></div>
            <div class="popup-row"><span class="popup-label">Password</span><span id="popup-password" class="popup-value popup-mono"></span><button class="popup-copy" data-copy="password">Copy</button></div>
        </div>
    </div>
    <div id="content">
        <div id="chat-panel">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input id="chat-input" type="text" placeholder="Message (@session &monitor)" autocomplete="off"/>
                <button id="btn-send">Send</button>
            </div>
        </div>
        <div id="terminal-panel">
            <div id="view-toggle-bar">
                <button id="btn-view-terminal" class="active" title="Terminal">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 4l4 4-4 4M9 12h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <button id="btn-view-dashboard" title="Dashboard">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="2" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/></svg>
                </button>
            </div>
            <div id="terminals"></div>
            <div id="empty-state">
                <p>No terminal sessions</p>
                <button id="btn-start">Create a session</button>
                <div class="hint-keys">
                    <span class="hint-key">@session</span>
                    <span class="hint-key">&session</span>
                    <span class="hint-key">+</span>
                </div>
            </div>
            <div id="dashboard-view">
                <div id="dashboard-sessions"></div>
                <div id="kanban-header">
                    <span class="kanban-title">Tasks</span>
                    <button id="btn-add-task">+ Add</button>
                </div>
                <div id="kanban-board">
                    <div class="kanban-column" data-column="todo">
                        <div class="kanban-column-header">Todo</div>
                        <div class="kanban-cards"></div>
                    </div>
                    <div class="kanban-column" data-column="in-progress">
                        <div class="kanban-column-header">In Progress</div>
                        <div class="kanban-cards"></div>
                    </div>
                    <div class="kanban-column" data-column="done">
                        <div class="kanban-column-header">Done</div>
                        <div class="kanban-cards"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
