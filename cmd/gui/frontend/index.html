<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="/style.css"/>
    <title>FingerSaver</title>
</head>
<body>
<div id="app">
    <div id="chat-panel">
        <div id="chat-header">
            <button id="btn-toggle" title="Toggle panel">&#x25C0;</button>
            <span>FingerSaver</span>
        </div>
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input id="chat-input" type="text" placeholder="Message... (@session to switch)" autocomplete="off"/>
            <button id="btn-send">Send</button>
        </div>
    </div>
    <div id="terminal-panel">
        <div id="tab-bar">
            <div id="tabs"></div>
            <button id="btn-new" title="New Session">+</button>
            <button id="btn-refresh" title="Refresh">&#x21bb;</button>
        </div>
        <div id="terminals"></div>
        <div id="empty-state">
            <p>No sessions</p>
            <button id="btn-start">Start tmux server or create a session</button>
        </div>
    </div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
